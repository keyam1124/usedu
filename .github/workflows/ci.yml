name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: macOS test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --workspace

      - name: JSON schema parses
        run: python3 -m json.tool schemas/usedu-json-v2.schema.json >/dev/null

      - name: Build x86_64
        run: cargo build --workspace --target x86_64-apple-darwin

      - name: Build arm64
        run: cargo build --workspace --target aarch64-apple-darwin
